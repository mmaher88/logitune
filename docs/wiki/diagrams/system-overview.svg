<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="ui-monospace, 'JetBrains Mono', monospace">
  <rect x="0" y="0" width="1200" height="900" fill="#0f172a"/>

  <!-- ============ Layer bands ============ -->
  <rect x="0" y="0"   width="1200" height="90"  fill="#ec4899" fill-opacity="0.08" stroke="#ec4899" stroke-width="1.5"/>
  <rect x="0" y="90"  width="1200" height="200" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="0" y="290" width="1200" height="460" fill="#10b981" fill-opacity="0.08" stroke="#10b981" stroke-width="1.5"/>
  <rect x="0" y="750" width="1200" height="80"  fill="#8b5cf6" fill-opacity="0.08" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="0" y="830" width="1200" height="70"  fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-width="1.5"/>

  <!-- ============ Layer labels ============ -->
  <g font-size="11" font-weight="700" letter-spacing="1.3" fill="#94a3b8">
    <text x="14" y="20">QML UI</text>
    <text x="14" y="110">APP LIBRARY &#8212; LOGITUNE-APP-LIB</text>
    <text x="14" y="310">CORE LIBRARY &#8212; LOGITUNE-CORE</text>
    <text x="14" y="770">LINUX KERNEL</text>
    <text x="14" y="850">HARDWARE &#8212; DEVICES/*/DESCRIPTOR.JSON</text>
  </g>

  <!-- ============ Core sub-band labels ============ -->
  <g font-size="9" font-weight="700" letter-spacing="1.2" fill="#64748b">
    <text x="14" y="336">INTEGRATION</text>
    <text x="14" y="456">DOMAIN</text>
    <text x="14" y="556">AGGREGATION</text>
    <text x="14" y="656">PROTOCOL</text>
  </g>

  <!-- ============ Core library faint sub-band dividers ============ -->
  <g stroke="#10b981" stroke-opacity="0.35" stroke-width="0.8" stroke-dasharray="3 3">
    <line x1="0" y1="440" x2="1200" y2="440"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="640" x2="1200" y2="640"/>
  </g>

  <!-- ============ Block outlines ============ -->
  <g fill="#0f172a" stroke-width="1">
    <!-- QML UI -->
    <rect x="30"   y="30" width="180" height="40" stroke="#ec4899" rx="4"/>
    <rect x="225"  y="30" width="150" height="40" stroke="#ec4899" rx="4"/>
    <rect x="390"  y="30" width="150" height="40" stroke="#ec4899" rx="4"/>
    <rect x="555"  y="30" width="180" height="40" stroke="#ec4899" rx="4"/>
    <rect x="750"  y="30" width="200" height="40" stroke="#ec4899" rx="4"/>
    <rect x="965"  y="30" width="210" height="40" stroke="#ec4899" rx="4"/>

    <!-- App library: Composition root -->
    <rect x="30"   y="125" width="220" height="44" stroke="#3b82f6" rx="4"/>
    <!-- App library: ViewModels row -->
    <rect x="30"   y="180" width="160" height="36" stroke="#3b82f6" rx="4"/>
    <rect x="200"  y="180" width="160" height="36" stroke="#3b82f6" rx="4"/>
    <rect x="370"  y="180" width="160" height="36" stroke="#3b82f6" rx="4"/>
    <rect x="540"  y="180" width="170" height="36" stroke="#3b82f6" rx="4"/>
    <rect x="720"  y="180" width="160" height="36" stroke="#3b82f6" rx="4"/>
    <rect x="890"  y="160" width="155" height="26" stroke="#3b82f6" rx="4"/>
    <rect x="890"  y="192" width="155" height="26" stroke="#3b82f6" rx="4"/>
    <rect x="1055" y="160" width="130" height="26" stroke="#3b82f6" rx="4"/>
    <rect x="1055" y="192" width="130" height="26" stroke="#3b82f6" rx="4"/>
    <!-- App library: Services + Shell -->
    <rect x="30"   y="230" width="180" height="36" stroke="#3b82f6" rx="4"/>
    <rect x="220"  y="230" width="195" height="36" stroke="#3b82f6" rx="4"/>
    <rect x="425"  y="230" width="205" height="36" stroke="#3b82f6" rx="4"/>
    <rect x="640"  y="230" width="180" height="36" stroke="#3b82f6" rx="4"/>
    <rect x="830"  y="230" width="170" height="36" stroke="#3b82f6" rx="4"/>
    <rect x="1010" y="230" width="170" height="36" stroke="#3b82f6" rx="4"/>

    <!-- Core / Integration (6 boxes) -->
    <rect x="140" y="360" width="160" height="36" stroke="#10b981" rx="4"/>
    <rect x="310" y="360" width="135" height="36" stroke="#10b981" rx="4"/>
    <rect x="455" y="360" width="135" height="36" stroke="#10b981" rx="4"/>
    <rect x="600" y="360" width="140" height="36" stroke="#10b981" rx="4"/>
    <rect x="750" y="360" width="150" height="36" stroke="#10b981" rx="4"/>
    <rect x="910" y="360" width="170" height="36" stroke="#10b981" rx="4"/>
    <!-- Desktop variant line -->
    <rect x="140" y="402" width="155" height="30" stroke="#10b981" stroke-opacity="0.6" rx="4"/>
    <rect x="305" y="402" width="140" height="30" stroke="#10b981" stroke-opacity="0.6" rx="4"/>

    <!-- Core / Domain -->
    <rect x="140" y="470" width="220" height="40" stroke="#10b981" rx="4"/>
    <rect x="375" y="470" width="220" height="40" stroke="#10b981" rx="4"/>

    <!-- Core / Aggregation -->
    <rect x="140" y="570" width="260" height="40" stroke="#10b981" rx="4"/>
    <rect x="420" y="570" width="260" height="40" stroke="#10b981" rx="4"/>

    <!-- Core / Protocol: DeviceSession + HID++ stack boxes -->
    <rect x="140" y="670" width="160" height="50" stroke="#10b981" rx="4"/>
    <rect x="320" y="670" width="165" height="36" stroke="#10b981" rx="4"/>
    <rect x="505" y="670" width="170" height="36" stroke="#10b981" rx="4"/>
    <rect x="695" y="670" width="150" height="36" stroke="#10b981" rx="4"/>
    <rect x="865" y="670" width="160" height="36" stroke="#10b981" rx="4"/>
    <!-- Capabilities strip -->
    <rect x="140" y="728" width="940" height="18" stroke="#10b981" stroke-opacity="0.45" rx="3"/>

    <!-- Linux kernel -->
    <rect x="80"  y="778" width="240" height="36" stroke="#8b5cf6" rx="4"/>
    <rect x="340" y="778" width="200" height="36" stroke="#8b5cf6" rx="4"/>
    <rect x="560" y="778" width="200" height="36" stroke="#8b5cf6" rx="4"/>
    <rect x="780" y="778" width="340" height="36" stroke="#8b5cf6" rx="4"/>

    <!-- Hardware -->
    <rect x="260" y="858" width="680" height="30" stroke="#f59e0b" rx="4"/>
  </g>

  <!-- ============ Block text ============ -->
  <g font-size="11" text-anchor="middle" fill="#e2e8f0">
    <!-- QML UI -->
    <text x="120" y="55">Main.qml (shell)</text>
    <text x="300" y="55">HomeView</text>
    <text x="465" y="55">DeviceView</text>
    <text x="645" y="55">AppSettingsView</text>
    <text x="850" y="55">Pages</text>
    <text x="1070" y="55">Components</text>

    <!-- App library -->
    <text x="140" y="152" font-weight="700" fill="#dbeafe">AppRoot</text>
    <text x="140" y="164" font-size="9" fill="#93c5fd">composition root</text>

    <text x="110" y="204">DeviceModel</text>
    <text x="280" y="204">ButtonModel</text>
    <text x="450" y="204">ActionModel</text>
    <text x="625" y="204">ActionFilterModel</text>
    <text x="800" y="204">ProfileModel</text>
    <text x="967" y="177" font-size="10">SettingsModel</text>
    <text x="967" y="209" font-size="10">EditorModel</text>
    <text x="1120" y="177" font-size="10">TrayManager</text>
    <text x="1120" y="209" font-size="10">Dialogs</text>

    <text x="120" y="254">ActiveDeviceResolver</text>
    <text x="317" y="254">DeviceCommandHandler</text>
    <text x="527" y="254">ButtonActionDispatcher</text>
    <text x="730" y="254">ProfileOrchestrator</text>
    <text x="915" y="254" font-style="italic" fill="#bfdbfe">ViewModels</text>
    <text x="1095" y="254" font-style="italic" fill="#bfdbfe">Shell + Dialogs</text>

    <!-- Core / Integration -->
    <text x="220" y="383">KDeDesktop</text>
    <text x="377" y="383">UinputInjector</text>
    <text x="522" y="383">ActionExecutor</text>
    <text x="670" y="383">DeviceFetcher</text>
    <text x="825" y="383">DescriptorWriter</text>
    <text x="995" y="383">IDesktopIntegration</text>

    <text x="217" y="422" font-size="10" fill="#cbd5e1">GnomeDesktop</text>
    <text x="375" y="422" font-size="10" fill="#cbd5e1">GenericDesktop</text>

    <!-- Core / Domain -->
    <text x="250" y="495">ProfileEngine</text>
    <text x="485" y="495">DeviceRegistry</text>

    <!-- Core / Aggregation -->
    <text x="270" y="595">PhysicalDevice</text>
    <text x="270" y="608" font-size="9" fill="#94a3b8">(transport aggregation)</text>
    <text x="550" y="595">DeviceManager</text>
    <text x="550" y="608" font-size="9" fill="#94a3b8">(hidraw enum + udev)</text>

    <!-- Core / Protocol -->
    <text x="220" y="691">DeviceSession</text>
    <text x="220" y="709" font-size="9" fill="#94a3b8">HID++ setter API</text>
    <text x="402" y="693">CommandProcessor</text>
    <text x="590" y="693">FeatureDispatcher</text>
    <text x="770" y="693">Transport</text>
    <text x="945" y="693">HidrawDevice</text>

    <!-- Capabilities strip text -->
    <text x="610" y="741" font-size="9" text-anchor="middle" fill="#94a3b8">HID++ feature capabilities: Battery, SmartShift, AdjustableDPI, DeviceName, GestureV2, HiResWheel, ReprogControls, ThumbWheel</text>

    <!-- Linux kernel -->
    <text x="200" y="801">/dev/hidrawN</text>
    <text x="440" y="801">libudev</text>
    <text x="660" y="801">D-Bus</text>
    <text x="950" y="801">/dev/uinput</text>

    <!-- Hardware -->
    <text x="600" y="878">MX Master 3S / 4 / Anywhere / Vertical</text>
  </g>
</svg>
