<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1DEBD8"/>
      <stop offset="100%" stop-color="#008B7A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>

  <!-- Mouse body — front view, white, left side -->
  <path d="M12 70 C12 44 21 28 38 28 L54 28 C68 28 72 44 72 70 L72 98 C72 110 64 118 50 118 C28 118 12 110 12 98 Z"
        fill="white" opacity="0.85"/>
  <!-- Left/right button divider -->
  <line x1="43" y1="28" x2="43" y2="60" stroke="rgba(0,100,85,0.35)" stroke-width="2"/>
  <!-- Scroll wheel slot -->
  <rect x="37" y="33" width="12" height="20" rx="6" fill="rgba(0,100,85,0.28)"/>

  <!-- Letter L — bold geometric, overlapping right -->
  <rect x="56" y="16" width="17" height="76" rx="4" fill="white"/>
  <rect x="56" y="76" width="48" height="17" rx="4" fill="white"/>
</svg>
